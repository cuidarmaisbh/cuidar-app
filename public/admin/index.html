<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuidar CMS</title>
    <!-- Redirect directory requests to the explicit index file (works around some dev servers) -->
    <script>
      if (location.pathname === '/admin' || location.pathname === '/admin/') {
        location.replace('/admin/index.html' + location.search + location.hash);
      }
    </script>
  </head>
  <body>
    <noscript>Decap CMS requires JavaScript. Enable JavaScript to use the admin.</noscript>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
